name: Daily RFP Scraper

on:
  schedule:
    - cron: '0 14 * * *'   # 7am Pacific (UTC-7)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      # - name: Run WEBS scraper
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      #   run: python scrapers/scrape_webs.py

      - name: Run OpenGov scraper (Seattle + Pierce County)
        env:
           SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
           SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrapers/scrape_opengov.py

